name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'Features'
    labels: ['feature', 'enhancement']
  - title: 'Fixes'
    labels: ['fix', 'bug']
  - title: 'Maintenance'
    labels: ['chore', 'docs', 'ci', 'refactor']
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
version-resolver:
  major: { labels: ['major'] }
  minor: { labels: ['minor', 'feature', 'enhancement'] }
  patch: { labels: ['patch', 'fix', 'bug', 'chore'] }
  default: patch
template: |
  ## What changed
  $CHANGES
